<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taters Awesome Site of Bandits</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: white;
    overflow-x: hidden;
}

/* =========================
   TOP BAR / LOGO
========================= */
.topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: #111;
    display: flex;
    align-items: center;
    padding: 0 15px;
    border-bottom: 1px solid #222;
    z-index: 10;
}

.logo-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo-img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid #ff2e2e;
    box-shadow: 0 0 10px #ff2e2e;
}

.logo-text {
    font-size: 18px;
    font-weight: bold;
    color: #ff2e2e;
}

/* =========================
   SIDEBAR
========================= */
.sidebar {
    position: fixed;
    top: 60px;
    width: 240px;
    height: calc(100vh - 60px);
    background: #111;
    padding: 15px;
    border-right: 1px solid #222;
}

.sidebar h2 {
    color: #ff2e2e;
}

/* =========================
   MAIN
========================= */
.main {
    margin-left: 260px;
    padding: 80px 20px 20px;
}

/* HERO */
.hero {
    background: linear-gradient(45deg, #111, #1a0000);
    padding: 20px;
    border-radius: 12px;
}

/* BUTTONS */
.btn {
    display: inline-block;
    padding: 10px 15px;
    background: #ff2e2e;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    margin-top: 10px;
    margin-right: 10px;
}

/* TWITCH BUTTON */
.twitch-btn {
    background: #9146ff;
}

/* TWITCH STATUS */
#twitchStatus {
    margin-top: 10px;
    display: inline-block;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 12px;
    background: #333;
    color: #aaa;
}

/* =========================
   LATEST VIDEO
========================= */
#latestCard {
    margin-top: 15px;
    background: #111;
    padding: 15px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
}

#latestCard:hover {
    box-shadow: 0 0 20px #ff2e2e;
    transform: scale(1.02);
}

#latestCard img {
    width: 100%;
    border-radius: 10px;
}

/* =========================
   VIDEO GRID
========================= */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 10px;
    margin-top: 20px;
}

.card {
    background: #222;
    padding: 10px;
    border-radius: 10px;
}

iframe {
    width: 100%;
    height: 180px;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- TOP HEADER -->
<div class="topbar">
    <div class="logo-wrap">
        <img src="assets/pfp.png" class="logo-img">
        <div class="logo-text">Taters Awesome Site of Bandits</div>
    </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🔥 Bandit Hub</h2>
    <p>Final Boss Site</p>
</div>

<!-- MAIN -->
<div class="main">

<div class="hero">
    <h1>👑 FINAL BOSS MODE</h1>
    <p>Creator Hub Online</p>

    <a class="btn" id="latestBtn" target="_blank">▶ Latest Video</a>

    <a class="btn twitch-btn" href="https://www.twitch.tv/thepotatobandit" target="_blank">
        🎮 Watch on Twitch
    </a>

    <div id="twitchStatus">Checking Twitch...</div>
</div>

<h2>🎬 Latest Upload</h2>

<div id="latestCard">
    <p id="latestTitle">Loading latest video...</p>
    <img id="latestThumb" style="display:none;">
</div>

<h2>📺 More Videos</h2>
<div class="grid" id="grid"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const channel = "Taterbandit";
const twitchUser = "thepotatobandit";

let latestURL = "";

/* ======================
   TWITCH STATUS
====================== */
function checkTwitchLive() {
    fetch(`https://decapi.me/twitch/stream/${twitchUser}`)
    .then(res => res.text())
    .then(text => {

        const status = document.getElementById("twitchStatus");

        if(text.includes("offline")) {
            status.innerText = "⚫ OFFLINE";
            status.style.background = "#222";
            status.style.color = "#aaa";
            status.style.boxShadow = "none";
        } else {
            status.innerText = "🔴 LIVE ON TWITCH";
            status.style.background = "#9146ff";
            status.style.color = "white";
            status.style.boxShadow = "0 0 10px #9146ff";
        }

    })
    .catch(() => {
        document.getElementById("twitchStatus").innerText = "⚠️ Status unavailable";
    });
}

checkTwitchLive();
setInterval(checkTwitchLive, 60000);

/* ======================
   LATEST VIDEO
====================== */

const card = document.getElementById("latestCard");
const thumb = document.getElementById("latestThumb");
const title = document.getElementById("latestTitle");
const btn = document.getElementById("latestBtn");

card.addEventListener("click", () => {
    if(latestURL) window.open(latestURL, "_blank");
});

fetch(`https://www.youtube.com/feeds/videos.xml?user=${channel}`)
.then(res => res.text())
.then(str => {

    const xml = new DOMParser().parseFromString(str, "text/xml");
    const entry = xml.querySelector("entry");

    const link = entry.querySelector("link").getAttribute("href");
    const videoId = link.split("v=")[1];

    latestURL = `https://www.youtube.com/watch?v=${videoId}`;

    title.innerText = entry.querySelector("title").textContent;

    thumb.src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
    thumb.style.display = "block";

    btn.href = latestURL;

});

/* ======================
   VIDEO GRID
====================== */

fetch(`https://www.youtube.com/feeds/videos.xml?user=${channel}`)
.then(res => res.text())
.then(str => {

    const xml = new DOMParser().parseFromString(str, "text/xml");
    const entries = xml.querySelectorAll("entry");

    const grid = document.getElementById("grid");

    entries.forEach((e, i) => {

        if(i === 0) return;

        const link = e.querySelector("link").getAttribute("href");
        const id = link.split("v=")[1];

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
        `;

        grid.appendChild(div);
    });

});

});
</script>

</body>
</html>
